<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shpruce — Under Construction</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='-1 38 212 226'%3E%3Cg transform='matrix(3.5,0,0,3.5,-245,-368.056)'%3E%3Cpath fill='%2356765a' d='M 100,180 130,170 100,130 Z'/%3E%3Cpath fill='%2356765a' d='M 100,150 120,143.33 100,116.67 Z'/%3E%3Cpath fill='%233e5641' d='M 100,180 70,170 100,130 Z'/%3E%3Cpath fill='%233e5641' d='M 100,150 80,143.33 100,116.67 Z'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f1f4f2;
  --bg-card:   #ffffff;
  --bg-raised: #e0e8e2;

  --border:    #b8cabb;
  --border-sub:#c8d5ca;

  --text-hi:   #141f16;
  --text-lo:   #58765e;
  --text-mute: #657366;

  --accent:    #3e5641;
  --r-md:  10px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
}

body {
  background: var(--bg);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2.25rem;
}

/* Enlarged nerd-mode box */
#glasses-box {
  width: 128px;
  height: 128px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 46px;
  color: var(--text-lo);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

#glasses-box:hover { background: var(--bg-card); color: var(--text-hi); border-color: var(--bg-raised); }
#glasses-box.active { background: var(--bg-card); border-color: var(--border); }

#glasses-box svg { display: block; color: inherit; }

#glasses-icon-face    { width: 91px; height: 27px; }
#glasses-icon-glasses { width: 91px; height: 46px; display: none; }

h1 {
  margin: 0;
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-mute);
  text-align: center;
}

.logo-mark {
  display: block;
  width: 1.425em;
  height: 1.425em;
  margin-top: -1.5rem;
}
</style>
</head>
<body>
  <div class="wrap">
    <div id="glasses-box" title="Nerd Mode">
      <svg id="glasses-icon-face" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 6" style="overflow:visible;">
        <circle id="face-eye-l" cx="4.5" cy="3" r="1.6" fill="currentColor"/>
        <circle id="face-eye-r" cx="15.5" cy="3" r="1.6" fill="currentColor"/>
      </svg>
      <svg id="glasses-icon-glasses" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 10" style="overflow:visible;">
        <g id="glasses-group">
          <line x1="1.3" y1="5" x2="0" y2="4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="4.5" cy="5" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/>
          <path d="M 7.7 5 Q 10 3.2 12.3 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="15.5" cy="5" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/>
          <line x1="18.7" y1="5" x2="20" y2="4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <h1>Watch this space.</h1>
    <svg class="logo-mark" viewBox="-1 38 212 226" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g transform="matrix(3.5,0,0,3.5,-245,-368.056)">
        <path fill="#56765a" d="M 100,180 130,170 100,130 Z"/>
        <path fill="#56765a" d="M 100,150 120,143.33 100,116.67 Z"/>
        <path fill="#3e5641" d="M 100,180 70,170 100,130 Z"/>
        <path fill="#3e5641" d="M 100,150 80,143.33 100,116.67 Z"/>
      </g>
    </svg>
  </div>

<script>
// ── Glasses removable toggle + cursor tracking — ported from the app's nerd-mode icon ────────
(function() {
  const box         = document.getElementById('glasses-box');
  const iconFace     = document.getElementById('glasses-icon-face');
  const iconGlasses  = document.getElementById('glasses-icon-glasses');

  let on = true; // glasses on by default

  function dropGlasses() {
    const bRect = box.getBoundingClientRect();

    const floater = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    floater.setAttribute('width', '91');
    floater.setAttribute('height', '46');
    floater.setAttribute('viewBox', '0 0 20 10');
    floater.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
      left:${bRect.left + bRect.width / 2 - 45.5}px;
      top:${bRect.top + bRect.height / 2 - 23}px;
      color:var(--text-lo);`;
    floater.innerHTML =
      `<line x1="1.3" y1="5" x2="0" y2="4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>` +
      `<circle cx="4.5" cy="5" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/>` +
      `<path d="M 7.7 5 Q 10 3.2 12.3 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>` +
      `<circle cx="15.5" cy="5" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/>` +
      `<line x1="18.7" y1="5" x2="20" y2="4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`;
    document.body.appendChild(floater);

    const startTop  = bRect.top + bRect.height / 2 - 23;
    const fadeEdge  = window.innerHeight;            // fade out as they clear the viewport
    const fallDist  = fadeEdge - startTop + 91;
    const duration  = 420;
    const startTime = performance.now();

    (function step(ts) {
      const t     = Math.min((ts - startTime) / duration, 1);
      const ease  = t * t;                            // ease-in = gravity acceleration
      const top   = startTop + fallDist * ease;
      const tilt  = ease * 38;                        // tilts as they fall
      const drift = ease * 27;                        // slight slide to the right (scaled)

      floater.style.top       = top + 'px';
      floater.style.left      = (bRect.left + bRect.width / 2 - 45.5 + drift) + 'px';
      floater.style.transform = `rotate(${tilt}deg)`;

      const fadeOver = 46;                            // px over which to fade (scaled)
      floater.style.opacity = top < fadeEdge - fadeOver ? '1'
        : top > fadeEdge ? '0'
        : String(1 - (top - (fadeEdge - fadeOver)) / fadeOver);

      if (t < 1) requestAnimationFrame(step);
      else floater.remove();
    })(startTime);
  }

  box.addEventListener('click', () => {
    on = !on;
    iconFace.style.display    = on ? 'none' : '';
    iconGlasses.style.display = on ? '' : 'none';
    if (!on) dropGlasses();
    box.classList.toggle('active', on);
    box.title = on ? 'Remove glasses' : 'Nerd Mode';
  });

  // Face dots: SVG centre positions in viewBox coords (20×6)
  const FACE_EYES = [
    { el: null, cx: 4.5,  cy: 3, maxX: 2.8, maxY: 1.6 },
    { el: null, cx: 15.5, cy: 3, maxX: 2.8, maxY: 1.6 },
  ];

  const GLASSES_MAX_X = 2.8;
  const GLASSES_MAX_Y = 1.6;
  const DEAD_ZONE_PX = 90; // just beyond the box's 64px radius
  const LERP = 0.22;

  let faceTarget    = FACE_EYES.map(e => ({ cx: e.cx, cy: e.cy }));
  let faceCurrent   = FACE_EYES.map(e => ({ cx: e.cx, cy: e.cy }));
  let glassesTarget  = { x: 0, y: 0 };
  let glassesCurrent  = { x: 0, y: 0 };
  let glassesGroup = null;
  let mouseX = -9999, mouseY = -9999;

  function computeTargets() {
    const rect = box.getBoundingClientRect();
    const bx   = rect.left + rect.width  / 2;
    const by   = rect.top  + rect.height / 2;

    const dx   = mouseX - bx;
    const dy   = mouseY - by;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const strength = dist < DEAD_ZONE_PX ? 0
                   : Math.min(1, (dist - DEAD_ZONE_PX) / DEAD_ZONE_PX);
    const nx = dist > 0 ? dx / dist : 0;
    const ny = dist > 0 ? dy / dist : 0;

    FACE_EYES.forEach((def, i) => {
      faceTarget[i].cx = def.cx + nx * def.maxX * strength;
      faceTarget[i].cy = def.cy + ny * def.maxY * strength;
    });

    glassesTarget.x = nx * GLASSES_MAX_X * strength;
    glassesTarget.y = ny * GLASSES_MAX_Y * strength;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function applyPositions() {
    FACE_EYES.forEach((def, i) => {
      faceCurrent[i].cx = lerp(faceCurrent[i].cx, faceTarget[i].cx, LERP);
      faceCurrent[i].cy = lerp(faceCurrent[i].cy, faceTarget[i].cy, LERP);
      if (def.el) {
        def.el.setAttribute('cx', faceCurrent[i].cx.toFixed(3));
        def.el.setAttribute('cy', faceCurrent[i].cy.toFixed(3));
      }
    });

    glassesCurrent.x = lerp(glassesCurrent.x, glassesTarget.x, LERP);
    glassesCurrent.y = lerp(glassesCurrent.y, glassesTarget.y, LERP);
    if (glassesGroup) {
      glassesGroup.setAttribute('transform',
        `translate(${glassesCurrent.x.toFixed(3)},${glassesCurrent.y.toFixed(3)})`);
    }
  }

  function loop() {
    computeTargets();
    applyPositions();
    requestAnimationFrame(loop);
  }

  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

  function init() {
    FACE_EYES[0].el = document.getElementById('face-eye-l');
    FACE_EYES[1].el = document.getElementById('face-eye-r');
    glassesGroup    = document.getElementById('glasses-group');
    iconFace.style.display    = 'none';
    iconGlasses.style.display = '';
    box.classList.add('active');
    box.title = 'Remove glasses';
    loop();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
