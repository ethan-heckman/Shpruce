<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content ="This is Ethan's Final Assignment">
        <title>Compose — Shpruce</title>
        <!--Fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <!--Scroll Reset Func-->
        <script>
            if('history' in window && 'scrollRestoration' in window){
                history.scrollRestoration = 'manual';
            }
        </script>
        <!--Quill Editor-->
        <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
        <!--Table Module-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill-table-better@1.1.7/dist/quill-table-better.css">
    </head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <header>
            <!--Logo-->
            <a href="../index.html" aria-label="Shpruce home">
                <div class="logo"><img src="../images/shpruce-wordmark-light.svg" width="185" height="72" alt=""></div>
            </a>
            <!--Content-->
            <div class="header-links">
                <a href="../index.html">Home</a>
                <span class="bar">&nbsp;&nbsp;|&nbsp;&nbsp;</span>
                <a href="https://shpruce.co/">Login</a>
            </div>
            <!--Login Button-->
            <!-- <div class="login-button"><button type="button">&nbsp;Login&nbsp;</button></div> -->
        </header>
        <main class="editor-page" id="main-content">
            <h1 class="sr-only">Compose</h1>
            <div id="editor">
                <p>This text is editable!</p>
                <p>Some initial <strong>bold</strong> text.</p>
                <p>Create accessible documents, right here in your browser!</p>
                <p><br></p>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
            <script>
                const quill = new Quill('#editor', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'header': [1, 2, 3, false] }],
                        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                        [{ 'indent': '-1' }, { 'indent': '+1' }],
                        [{ 'align': [] }],
                        ['link', 'image'],
                        ['clean']
                    ]
                }
                });
                quill.root.setAttribute('aria-label', 'Document editor');
                document.querySelectorAll('.ql-picker-label').forEach(label => {
                    if (label.parentElement.classList.contains('ql-header')) label.setAttribute('aria-label', 'Text style');
                    if (label.parentElement.classList.contains('ql-align')) label.setAttribute('aria-label', 'Text alignment');
                });
            </script>
            <script src="../scripts/paginate.js"></script>
        </main>
        <div class="comp-footer">&copy; Ethan</div>
    </body>
</html>
