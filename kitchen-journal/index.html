<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linda's Cozy Kitchen Journal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<p><a href="../index.html">&larr; All Projects</a></p>

<header>
    <h1>Cozy Kitchen Journal</h1>
    <p>Simple meals, slow moments, and recipes worth keeping</p>
    <button onclick="toggleDarkMode()">Toggle Cozy Mode</button>
</header>

<input 
    type="text" 
    id="search" 
    placeholder="Search recipes..." 
    onkeyup="searchRecipes()"
>

<!-- FILTERS -->
<div class="filters">
    <button onclick="filterRecipes('all')">All</button>
    <button onclick="filterRecipes('breakfast')">Breakfast</button>
    <button onclick="filterRecipes('dinner')">Dinner</button>
    <button onclick="filterRecipes('dessert')">Dessert</button>
</div>

<!-- RECIPE 1 -->
<section class="recipe dinner">
    <h2>Creamy Chicken Pasta</h2>
    <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b" alt="pasta">

    <div class="like" data-recipe="pasta" onclick="toggleLike(this, 'pasta')">❤️</div>
    <div class="rating" data-recipe="pasta" onclick="rate(this, 'pasta', 5)">⭐⭐⭐⭐⭐</div>

    <button onclick="toggleRecipe('pastaContent')">View Recipe</button>

    <div id="pastaContent" class="content">
        <p>Comforting and creamy dinner favorite.</p>
    </div>

    <div class="comments">
        <h3>Comments</h3>
        <div id="comments-pasta"></div>

        <input id="name-pasta" placeholder="Your name">
        <input id="input-pasta" placeholder="Write a comment">
        <button onclick="addComment('pasta')">Post</button>
    </div>
</section>

<!-- RECIPE 2 -->
<section class="recipe dessert">
    <h2>Chocolate Chip Cookies</h2>
    <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e" alt="cookies">

    <div class="like" data-recipe="cookie" onclick="toggleLike(this, 'cookie')">❤️</div>
    <div class="rating" data-recipe="cookie" onclick="rate(this, 'cookie', 5)">⭐⭐⭐⭐⭐</div>

    <button onclick="toggleRecipe('cookieContent')">View Recipe</button>

    <div id="cookieContent" class="content">
        <p>Warm cookies straight from the oven.</p>
    </div>

    <div class="comments">
        <h3>Comments</h3>
        <div id="comments-cookie"></div>

        <input id="name-cookie" placeholder="Your name">
        <input id="input-cookie" placeholder="Write a comment">
        <button onclick="addComment('cookie')">Post</button>
    </div>
</section>

<!-- UPLOAD FORM -->
<section class="upload">
    <h2>Share a Recipe</h2>

    <input id="newTitle" placeholder="Recipe name">

    <select id="newCategory">
        <option value="breakfast">Breakfast</option>
        <option value="dinner">Dinner</option>
        <option value="dessert">Dessert</option>
    </select>

    <button onclick="addRecipe()">Add Recipe</button>
</section>

<footer>
    <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="pages/resources.html">Resources</a></li>
    </ul>
</footer>

<script src="script.js"></script>
</body>
</html>
